<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e4f43" />
    <title>Smart Pill Dashboard</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(145deg, #182622 0%, #223631 45%, #101714 100%);
        color: #eef4df;
      }
      .card {
        width: min(92vw, 420px);
        padding: 24px;
        border-radius: 18px;
        background: rgba(17, 25, 23, 0.9);
        border: 1px solid rgba(197, 225, 165, 0.18);
        text-align: center;
      }
      h1 { color: #c5e1a5; margin-top: 0; }
      p { line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline</h1>
      <p>The Smart Pill Dashboard is temporarily offline. Reconnect to continue syncing schedules and alerts.</p>
    </div>
  </body>
</html>
